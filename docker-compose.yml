services:
  customer-web:
    build:
      context: .
      dockerfile: apps/customer-web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_LINE_LIFF_ID: ${LINE_LIFF_ID:-}
    restart: unless-stopped
    depends_on:
      - api

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: line_order
      POSTGRES_USER: app
      POSTGRES_PASSWORD: password
      TZ: Asia/Taipei
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d line_order"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - customer-web
      - admin-web
      - api

volumes:
  postgres_data:


