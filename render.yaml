services:
  - type: web
    name: line-order-system-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build --workspace @line-order/api
    startCommand: npm run prisma:deploy --workspace @line-order/api && npm run prisma:seed --workspace @line-order/api && npm run start --workspace @line-order/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Taipei
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: line-order-system-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_ACCOUNT
        value: admin
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: CUSTOMER_WEB_URL
        value: https://line-order-system-customer.onrender.com
      - key: ADMIN_WEB_URL
        value: https://line-order-system-admin.onrender.com
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_LIFF_ID
        sync: false
      - key: LINE_MESSAGING_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_ORDER_NOTIFICATION_TO
        sync: false
      - key: LINE_ORDER_NOTIFICATION_ENABLED
        value: "true"
      - key: CLOUDFLARE_PUBLIC_URL
        value: ""

  - type: web
    name: line-order-system-customer
    runtime: static
    buildCommand: npm ci && npm run build --workspace @line-order/customer-web
    staticPublishPath: apps/customer-web/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://line-order-system-api.onrender.com/api
      - key: VITE_LINE_LIFF_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: line-order-system-admin
    runtime: static
    buildCommand: npm ci && npm run build --workspace @line-order/admin-web
    staticPublishPath: apps/admin-web/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://line-order-system-api.onrender.com/api
      - key: VITE_ADMIN_BASE_PATH
        value: /
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: line-order-system-db
    plan: free
    region: singapore
    databaseName: line_order
    user: line_order_user
